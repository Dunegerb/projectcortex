* { box-sizing: border-box; }
html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#000; }
body { min-height:100dvh; display:grid; place-items:center; }
.iphone-xs {
  position:relative; width:var(--screen-w); height:var(--screen-h); overflow:hidden;
  isolation:isolate; background:#000; touch-action:manipulation;
}
.design-space {
  position:absolute; left:0; top:0; width:739px; height:1600px;
  transform:scale(.5074424899,.5075); transform-origin:0 0; background:#000;
}
.motion { transition-duration:var(--duration); transition-timing-function:var(--ease); }

/* Lightsbackground fiel ao Figma: Layer blur 46.8 = sigma 23.4 no SVG/CSS. */
.scene-light {
  position:absolute; z-index:1;
  background:#313131;
  filter:blur(23.4px);
  transition-property:left,top,width,height;
  will-change:left,top,width,height;
}
.scene-light.top { left:173px; top:680px; width:33px; height:59.627px; }
.scene-light.bottom { left:173px; top:821.373px; width:33px; height:59.627px; }
.is-frame-2 .scene-light.top { left:479px; top:696px; width:82px; height:62px; }
.is-frame-2 .scene-light.bottom { left:479px; top:843px; width:82px; height:62px; }

/* A lente permanece recortada exatamente pelo glasslogo. */
.glass {
  position:absolute; z-index:2; left:149px; top:651px; width:442px; height:298px;
  pointer-events:none; user-select:none;
}
.glass-mask {
  position:absolute; inset:0;
  -webkit-mask-image:var(--glass-mask); mask-image:var(--glass-mask);
  -webkit-mask-repeat:no-repeat; mask-repeat:no-repeat;
  -webkit-mask-size:100% 100%; mask-size:100% 100%;
  -webkit-mask-position:center; mask-position:center;
}

/* Refração/Depth 100: a mesma luz #313131 é duplicada dentro da lente,
   deformada sem transformar o vidro em uma superfície branca. */
.glass-refract {
  overflow:hidden;
  filter:url(#liquid-warp);
  backdrop-filter:brightness(1.035) contrast(1.10);
  -webkit-backdrop-filter:brightness(1.035) contrast(1.10);
}
.refracted-light {
  position:absolute;
  background:#313131;
  filter:blur(23.4px);
  transition-property:left,top,width,height;
  will-change:left,top,width,height;
}
.refracted-light.top { left:24px; top:29px; width:33px; height:59.627px; }
.refracted-light.bottom { left:24px; top:170.373px; width:33px; height:59.627px; }
.is-frame-2 .refracted-light.top { left:330px; top:45px; width:82px; height:62px; }
.is-frame-2 .refracted-light.bottom { left:330px; top:192px; width:82px; height:62px; }

/* Splay 0: sem faixa luminosa artificial; a caustic fica praticamente imperceptível. */
.caustic {
  position:absolute;
  width:10px;
  border-radius:50%;
  background:rgba(255,255,255,.025);
  filter:blur(6px);
  transition-property:left,top,height,opacity;
  opacity:.08;
}
.caustic.top { left:48px; top:25px; height:70px; }
.caustic.bottom { left:48px; top:166px; height:70px; }
.is-frame-2 .caustic.top { left:397px; top:40px; height:72px; opacity:.06; }
.is-frame-2 .caustic.bottom { left:397px; top:187px; height:72px; opacity:.06; }

/* Fill exato: #F1F1F1 a apenas 1%. O material continua majoritariamente preto. */
.glass-tone {
  background:rgba(241,241,241,.01);
  mix-blend-mode:normal;
}
.glass-vignette {
  background:linear-gradient(135deg, rgba(255,255,255,.004), rgba(0,0,0,.12));
  mix-blend-mode:normal;
}

.glass-vector { position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
.glass-vector .base { fill:#F1F1F1; fill-opacity:.01; }
.glass-vector .rim { fill:none; stroke:url(#rim-light); stroke-width:.92; opacity:.7; }
.glass-vector .rim-soft { fill:none; stroke:url(#rim-soft); stroke-width:2.15; opacity:.18; filter:url(#rim-blur); }
.glass-vector .shadow-rim { fill:none; stroke:url(#rim-shadow); stroke-width:1; opacity:.42; }
.glass-vector .dispersion-c { fill:none; stroke:#8ad8ff; stroke-width:.62; opacity:.02; transform:translate(.45px,-.25px); }
.glass-vector .dispersion-m { fill:none; stroke:#ff9fcf; stroke-width:.62; opacity:.014; transform:translate(-.4px,.28px); }
.glass-vector .specular { fill:#fff; fill-opacity:.065; filter:url(#specular-light); opacity:.2; }

.logo {
  position:absolute; z-index:3; transition-property:left,top,width,height;
  will-change:left,top,width,height;
}
.logo img {
  position:absolute; inset:0; width:100%; height:100%; display:block;
  transition:opacity var(--duration) var(--ease); pointer-events:none; user-select:none;
}
.logo .from { opacity:1; } .logo .to { opacity:0; }
.text-logo { left:304px; top:756px; width:131px; height:88px; }
.icon-logo { left:337px; top:774px; width:66px; height:53px; }
.is-frame-2 .text-logo { left:355px; top:790px; width:29px; height:19px; }
.is-frame-2 .icon-logo { left:288px; top:735px; width:164px; height:131px; }
.is-frame-2 .logo .from { opacity:0; } .is-frame-2 .logo .to { opacity:1; }

@media (prefers-reduced-motion:reduce) { .motion,.logo img { transition:none!important; } }

<script>
(() => {
  const loader = document.getElementById('loader');
  const fixed = new URLSearchParams(location.search).get('frame');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const INITIAL_HOLD_MS = 900;

  const nextPaint = callback =>
    requestAnimationFrame(() => requestAnimationFrame(callback));

  const frame2 = () => loader.classList.add('is-frame-2');

  const replay = () => {
    loader.classList.remove('is-frame-2');
    void loader.offsetWidth;
    nextPaint(frame2);
  };

  const imagesReady = Promise.all(
    [...document.images].map(image =>
      image.decode ? image.decode().catch(() => {}) : Promise.resolve()
    )
  );
  const fontsReady = document.fonts?.ready ?? Promise.resolve();

  if (fixed === '1') {
    loader.classList.remove('is-frame-2');
  } else if (fixed === '2' || reduced) {
    frame2();
  } else {
    Promise.all([imagesReady, fontsReady]).then(() => {
      setTimeout(() => nextPaint(frame2), INITIAL_HOLD_MS);
    });
  }

  if (!fixed && !reduced) loader.addEventListener('pointerdown', replay);
})();
</script>
